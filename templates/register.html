{% extends "base.html" %}

{% block title %}Register{% endblock %}

{% block content %}

<div class="container mt-5" style="max-width:600px;">

    <h2 class="text-center mb-4">
        Student Registration
    </h2>

    <form method="POST" action="/register">

        <div class="mb-3">
            <label>Name</label>
            <input
                type="text"
                name="name"
                class="form-control"
                required>
        </div>

        <div class="mb-3">
            <label>Email</label>
            <input
                type="email"
                name="email"
                class="form-control"
                required>
        </div>

        <div class="mb-3">
            <label>Password</label>
            <input
                type="password"
                name="password"
                class="form-control"
                required>
        </div>

        <div class="mb-3">
            <label>Role</label>

            <select
                name="role"
                class="form-control">

                <option>Student</option>
                <option>Company</option>

            </select>

        </div>

        <button class="btn btn-primary w-100">
            Register
        </button>

    </form>

</div>

{% endblock %}
